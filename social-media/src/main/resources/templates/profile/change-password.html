<div th:fragment="content">
    <div class="form-group">
        <label>Mật khẩu hiện tại</label>
        <input type="password" class="form-control" th:field="*{currentPassword}"
               th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'"
               placeholder="Nhập mật khẩu hiện tại">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
    </div>

    <div class="form-group">
        <label>Mật khẩu mới</label>
        <input type="password" class="form-control" th:field="*{newPassword}"
               id="newPasswordInput"
               th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
               placeholder="Ít nhất 8 ký tự, 1 chữ hoa, 1 chữ số"
               oninput="checkPasswordStrength(this.value)">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        <div id="password-strength-bar" style="height:4px;border-radius:2px;margin-top:4px;transition:all .3s;width:0"></div>
        <small id="password-strength-text" class="text-muted"></small>
    </div>
    <script>
    function checkPasswordStrength(val) {
        const bar = document.getElementById('password-strength-bar');
        const txt = document.getElementById('password-strength-text');
        if (!bar) return;
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const levels = [
            {w:'25%', color:'#e74c3c', label:'Yếu'},
            {w:'50%', color:'#e67e22', label:'Trung bình'},
            {w:'75%', color:'#f1c40f', label:'Khá'},
            {w:'100%', color:'#27ae60', label:'Mạnh'},
        ];
        const lvl = levels[Math.max(0, score - 1)] || levels[0];
        bar.style.width = val.length ? lvl.w : '0';
        bar.style.background = lvl.color;
        txt.textContent = val.length ? lvl.label : '';
        txt.style.color = lvl.color;
    }
    </script>

    <div class="form-group">
        <label>Xác nhận mật khẩu mới</label>
        <input type="password" class="form-control" th:field="*{confirmPassword}"
               th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
               placeholder="Nhập lại mật khẩu mới">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
    </div>
</div>
