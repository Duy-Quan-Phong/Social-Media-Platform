<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gợi ý kết bạn</title>
    <th:block th:replace="fragments/chat-fragment :: chatResources"></th:block>
    <th:block th:replace="~{fragments/common/commonHead :: commonHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/friend_card.css}">
</head>
<body>
<div th:replace="~{fragments/common/header :: header}"></div>

<div class="container my-4">
    <div class="row">
        <div class="col-md-3">
            <div class="sidebar sticky-top" style="top: 80px;">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <h5 class="mb-0 fw-bold">Bạn bè</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:class="'list-group-item list-group-item-action ' + (${filter == 'non-friends'} ? 'active fw-bold' : '')"
                           th:href="@{/friends(filter='non-friends')}">Gợi ý kết bạn</a>
                        <a th:class="'list-group-item list-group-item-action ' + (${filter == 'all'} ? 'active fw-bold' : '')"
                           th:href="@{/friends(filter='all')}">Tất cả bạn bè</a>
                        <a th:class="'list-group-item list-group-item-action ' + (${filter == 'sent-requests'} ? 'active fw-bold' : '')"
                           th:href="@{/friends(filter='sent-requests')}">Lời mời đã gửi</a>
                        <a th:class="'list-group-item list-group-item-action ' + (${filter == 'received-requests'} ? 'active fw-bold' : '')"
                           th:href="@{/friends(filter='received-requests')}">Lời mời nhận được</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-9">
            <input type="hidden" id="filterValue" th:value="${filter}" />
            <input type="hidden" id="targetUserId" th:value="${targetUserId}" />

            <div th:if="${filter == 'non-friends'}">

                <div th:if="${not #lists.isEmpty(recommendations)}" class="mb-4">
                    <h5 class="mb-3 fw-bold text-dark">Những người bạn có thể biết</h5>

                    <div class="row row-cols-1 row-cols-md-3 g-3">
                        <div class="col" th:each="rec : ${recommendations}">
                            <div class="card h-100 border-0 shadow-sm">
                                <img th:src="${rec.suggestedUser.profilePicture != null ? rec.suggestedUser.profilePicture : '/images/default-avatar.jpg'}"
                                     class="card-img-top" alt="Avatar"
                                     style="height: 220px; object-fit: cover;">

                                <div class="card-body d-flex flex-column p-3">
                                    <h6 class="card-title fw-bold mb-1 text-truncate">
                                        <a th:href="@{'/profile/' + ${rec.suggestedUser.id}}" class="text-decoration-none text-dark"
                                           th:text="${rec.suggestedUser.lastName + ' ' + rec.suggestedUser.firstName}">
                                            Tên User
                                        </a>
                                    </h6>

                                    <p class="card-text small text-muted mb-3" th:text="${rec.reason}">
                                        Có bạn chung
                                    </p>

                                    <div class="mt-auto d-grid gap-2">
                                        <button class="btn btn-primary btn-sm fw-bold"
                                                style="background-color: #e7f3ff; color: #1877f2; border: none;"
                                                th:onclick="'sendFriendRequest(' + ${rec.suggestedUser.id} + ')'">
                                            Thêm bạn bè
                                        </button>
                                        <button class="btn btn-light btn-sm text-muted">Xóa</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <hr class="my-4 text-muted" style="opacity: 0.1">
                </div>

                <div class="mb-3">
                    <h5 class="fw-bold text-dark">Khám phá thêm</h5>
                </div>

                <div class="row row-cols-1 row-cols-md-3 g-3">
                    <div class="col" th:each="user : ${otherUsers}">
                        <div class="card h-100 border-0 shadow-sm">
                            <img th:src="${user.profilePicture != null ? user.profilePicture : '/images/default-avatar.jpg'}"
                                 class="card-img-top" alt="Avatar"
                                 style="height: 220px; object-fit: cover;">

                            <div class="card-body d-flex flex-column p-3">
                                <h6 class="card-title fw-bold mb-1 text-truncate">
                                    <a th:href="@{'/profile/' + ${user.id}}" class="text-decoration-none text-dark"
                                       th:text="${user.lastName + ' ' + user.firstName}">
                                        Tên User
                                    </a>
                                </h6>
                                <p class="card-text small text-muted mb-3">&nbsp;</p> <div class="mt-auto d-grid gap-2">
                                <button class="btn btn-primary btn-sm fw-bold"
                                        style="background-color: #e7f3ff; color: #1877f2; border: none;"
                                        th:onclick="'sendFriendRequest(' + ${user.id} + ')'">
                                    Thêm bạn bè
                                </button>
                                <button class="btn btn-light btn-sm text-muted">Xóa</button>
                            </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:unless="${filter == 'non-friends'}">
                <h2 id="list-title" th:text="${listTitle}" class="mb-4 fw-bold">Danh sách bạn bè</h2>
                <div class="row" id="friends-list"></div>
                <div class="loading text-center p-4" id="loading">
                    <i class="fas fa-spinner fa-spin fa-2x text-primary"></i>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="fragments/chat-fragment :: chatContainers"></div>

<script th:src="@{/js/load-friend.js}"></script>
<script th:src="@{/js/friend-button.js}"></script>

<script>
    function sendFriendRequest(userId) {
        $.post("/api/friends/request/" + userId, function(data) {
            alert("Đã gửi lời mời!");
            location.reload();
        }).fail(function() {
            alert("Lỗi kết nối.");
        });
    }
</script>

</body>
</html>
