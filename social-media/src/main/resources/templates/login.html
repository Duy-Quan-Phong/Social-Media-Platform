<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Social Media</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
<div class="container" id="container">

    <!-- Form Đăng ký  -->
    <div class="form-container sign-up">
        <form th:action="@{/register}" method="post" th:object="${user}">
            <h1>Tạo tài khoản</h1>

            <div class="social-icons">
                <a href="/oauth2/authorization/google" class="icon"><i class="fab fa-google-plus-g"></i></a>
                <a href="/oauth2/authorization/facebook" class="icon"><i class="fab fa-facebook-f"></i></a>
            </div>

            <input type="text" th:field="*{firstName}" placeholder="Tên">
            <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="error-message"></span>

            <input type="text" th:field="*{lastName}" placeholder="Họ">
            <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="error-message"></span>

            <input type="text" id="reg-username" th:field="*{username}" placeholder="Tên đăng nhập *"
                   oninput="checkUsernameAvailability(this.value)">
            <span id="username-feedback" style="font-size:12px;display:block;margin-top:-6px;margin-bottom:4px"></span>
            <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="error-message"></span>

            <input type="email" id="reg-email" th:field="*{email}" placeholder="Email *"
                   oninput="checkEmailAvailability(this.value)">
            <span id="email-feedback" style="font-size:12px;display:block;margin-top:-6px;margin-bottom:4px"></span>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></span>

            <input type="text" th:field="*{phone}" placeholder="Số điện thoại">
            <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="error-message"></span>

            <input type="date" th:field="*{dateOfBirth}" placeholder="Ngày sinh">
            <span th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}" class="error-message"></span>

            <input type="password" id="reg-password" th:field="*{password}" placeholder="Mật khẩu *"
                   oninput="checkRegPasswordStrength(this.value); checkRegPasswordMatch()">
            <div id="reg-strength-bar" style="height:4px;border-radius:2px;margin:-6px 0 4px;background:#eee;display:none">
                <div id="reg-strength-fill" style="height:100%;border-radius:2px;transition:width .3s,background .3s;width:0"></div>
            </div>
            <span id="reg-strength-text" style="font-size:12px;display:block;margin-top:-2px;margin-bottom:4px"></span>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-message"></span>

            <input type="password" id="reg-confirm" th:field="*{confirmPassword}" placeholder="Xác nhận mật khẩu *"
                   oninput="checkRegPasswordMatch()">
            <span id="reg-match-text" style="font-size:12px;display:block;margin-top:-6px;margin-bottom:4px"></span>
            <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="error-message"></span>

            <button type="submit">Đăng ký</button>
        </form>
    </div>

    <!-- Form Đăng nhập -->
    <div class="form-container sign-in">
        <form th:action="@{${loginAction}}" method="post">
            <h1>Đăng nhập</h1>

            <!-- Chỉ user thường mới thấy nút mạng xã hội -->
            <div class="social-icons">
                <a href="/oauth2/authorization/google" class="icon"><i class="fab fa-google-plus-g"></i></a>
                <a href="/oauth2/authorization/facebook" class="icon"><i class="fab fa-facebook-f"></i></a>
            </div>

            <!-- Thông báo lỗi -->
            <div th:if="${param.error}" class="alert alert-danger">
                <span th:text="${param.error}"></span>
            </div>

            <div th:if="${param.logout}" class="alert alert-success">Đăng xuất thành công!</div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <input type="text" name="username" placeholder="Tên đăng nhập hoặc Email" required>
            <input type="password" name="password" placeholder="Mật khẩu" required>

            <a href="/forgot-password">Quên mật khẩu?</a>
            <button type="submit">Đăng nhập</button>

            <p>Chưa có tài khoản? <a href="#" id="register-link">Đăng ký ngay</a></p>

        </form>
    </div>

    <!-- Toggle panel (chỉ cho user thường) -->
    <div class="toggle-container">
        <div class="toggle">
            <div class="toggle-panel toggle-left">
                <h1>Chào mừng trở lại!</h1>
                <p>Nhập thông tin cá nhân để sử dụng tất cả tính năng của trang web</p>
                <button class="hidden" id="login">Đăng nhập</button>
            </div>
            <div  class="toggle-panel toggle-right">
                <h1>Xin chào!</h1>
                <p>Đăng ký với thông tin cá nhân để sử dụng tất cả tính năng của trang web</p>
                <button class="hidden" id="register">Đăng ký</button>
            </div>

        </div>
    </div>

</div>

<script>
    const container = document.getElementById('container');
    const registerBtn = document.getElementById('register');
    const loginBtn = document.getElementById('login');
    const registerLink = document.getElementById('register-link');

    // Chuyển sang form đăng ký
    registerBtn?.addEventListener('click', () => container.classList.add("active"));
    registerLink?.addEventListener('click', () => container.classList.add("active"));

    // Chuyển sang form đăng nhập
    loginBtn?.addEventListener('click', () => container.classList.remove("active"));

    // Nếu có lỗi ở form đăng ký thì mở sẵn form đăng ký
    document.addEventListener('DOMContentLoaded', () => {
        if (document.querySelector('.sign-up .error-message')) {
            container.classList.add("active");
        }
    });

    // Ẩn thông báo lỗi khi focus input
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('focus', () => {
            const err = input.nextElementSibling;
            if (err?.classList.contains('error-message')) {
                err.style.display = 'none';
            }
        });
    });

    // ── Password strength indicator ──────────────────────────
    function checkRegPasswordStrength(val) {
        const bar = document.getElementById('reg-strength-bar');
        const fill = document.getElementById('reg-strength-fill');
        const text = document.getElementById('reg-strength-text');
        if (!val) { bar.style.display = 'none'; text.textContent = ''; return; }
        bar.style.display = 'block';
        let score = 0;
        if (val.length >= 8)  score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const levels = [
            { w: '25%', bg: '#e74c3c', label: 'Rất yếu' },
            { w: '50%', bg: '#e67e22', label: 'Yếu' },
            { w: '75%', bg: '#f1c40f', label: 'Trung bình' },
            { w: '100%', bg: '#2ecc71', label: 'Mạnh' }
        ];
        const lv = levels[score - 1] || levels[0];
        fill.style.width = lv.w;
        fill.style.background = lv.bg;
        text.textContent = lv.label;
        text.style.color = lv.bg;
    }

    // ── Password match indicator ──────────────────────────────
    function checkRegPasswordMatch() {
        const pw = document.getElementById('reg-password')?.value || '';
        const cf = document.getElementById('reg-confirm')?.value || '';
        const el = document.getElementById('reg-match-text');
        if (!cf) { el.textContent = ''; return; }
        if (pw === cf) {
            el.textContent = '✓ Mật khẩu khớp';
            el.style.color = '#2ecc71';
        } else {
            el.textContent = '✗ Mật khẩu không khớp';
            el.style.color = '#e74c3c';
        }
    }

    // ── Availability checks (debounced) ──────────────────────
    let usernameTimer, emailTimer;

    function checkUsernameAvailability(val) {
        clearTimeout(usernameTimer);
        const el = document.getElementById('username-feedback');
        if (!val || val.length < 3) { el.textContent = ''; return; }
        usernameTimer = setTimeout(() => {
            fetch('/api/check/username?value=' + encodeURIComponent(val))
                .then(r => r.json())
                .then(data => {
                    if (data.available) {
                        el.textContent = '✓ Tên đăng nhập có thể sử dụng';
                        el.style.color = '#2ecc71';
                    } else {
                        el.textContent = '✗ Tên đăng nhập đã tồn tại';
                        el.style.color = '#e74c3c';
                    }
                }).catch(() => { el.textContent = ''; });
        }, 500);
    }

    function checkEmailAvailability(val) {
        clearTimeout(emailTimer);
        const el = document.getElementById('email-feedback');
        if (!val || !val.includes('@')) { el.textContent = ''; return; }
        emailTimer = setTimeout(() => {
            fetch('/api/check/email?value=' + encodeURIComponent(val))
                .then(r => r.json())
                .then(data => {
                    if (data.available) {
                        el.textContent = '✓ Email có thể sử dụng';
                        el.style.color = '#2ecc71';
                    } else {
                        el.textContent = '✗ Email đã được đăng ký';
                        el.style.color = '#e74c3c';
                    }
                }).catch(() => { el.textContent = ''; });
        }, 500);
    }
</script>
</body>
</html>
